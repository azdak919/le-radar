name: Update Student News

on:
  schedule:
    # Three times a day (08:00, 14:00, 20:00 UTC)
    - cron: '0 8,14,20 * * *'
  workflow_dispatch:   # Allow manual trigger

# Never run two news-update jobs against the same ref at once.
concurrency:
  group: update-news-${{ github.ref }}
  cancel-in-progress: false

jobs:
  aggregate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and aggregate student-media RSS feeds
        run: |
          node scripts/fetch-news.js --update
        env:
          CI: true

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet news.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push updates
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "RÉQ News Bot"
          git config user.email "actions@users.noreply.github.com"
          git add news.json
          git commit -m "bot: update student news feed (auto)"
          # Rebase onto any work pushed since checkout so the bot never
          # clobbers manual commits and never fails on a fast-forward race.
          for i in 1 2 3; do
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" && git push && exit 0
            echo "push attempt $i failed, retrying…"
            sleep $((i * 3))
          done
          echo "::error::could not push bot update after retries"
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
