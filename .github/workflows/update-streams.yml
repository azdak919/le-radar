name: Update Radio Streams

on:
  schedule:
    # Run every day at 6am UTC
    - cron: '0 6 * * *'
  workflow_dispatch:   # Allow manual trigger
  push:
    paths:
      - 'radios.json'

jobs:
  discover:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Discover and validate streams
        run: |
          node scripts/discover-streams.js --update
        env:
          CI: true

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet radios.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push updates
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "RÉQ Stream Bot"
          git config user.email "actions@users.noreply.github.com"
          git add radios.json
          git commit -m "bot: update discovered streams (auto)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}